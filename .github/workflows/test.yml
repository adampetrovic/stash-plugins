name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng ffmpeg

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: |
          cd plugins/username-extractor
          python -m pytest tests/ -v
